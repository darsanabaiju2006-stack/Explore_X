<!-- login.html -->
{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <span style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#0f172a;">◈ Explore<span style="color:#16c79a;">X</span></span>
                <p class="text-muted small mt-1">Welcome back, traveler</p>
            </div>
            <h2 class="auth-title mb-4">Sign In</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control border-start-0" placeholder="you@email.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-accent w-100 py-2 mb-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
            <p class="text-center text-muted small mb-3">Don't have an account? <a href="{{ url_for('register') }}" class="text-accent fw-bold">Register here</a></p>
            <div class="p-3 rounded-3" style="background:#f8fafc;border:1px dashed #cbd5e1;">
                <p class="text-muted mb-1" style="font-size:0.78rem;"><strong>Demo Credentials:</strong></p>
                <p class="mb-0" style="font-size:0.78rem;">
                    👤 User: <code>arun@gmail.com</code> / <code>user123</code><br>
                    ⚙️ Admin: <code>admin@explorex.com</code> / <code>admin123</code>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
