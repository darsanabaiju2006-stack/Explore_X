{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <span style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#0f172a;">◈ Explore<span style="color:#16c79a;">X</span></span>
                <p class="text-muted small mt-1">Create your travel account</p>
            </div>
            <h2 class="auth-title mb-4">Create Account</h2>
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" name="name" class="form-control border-start-0" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control border-start-0" placeholder="you@email.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Min. 6 characters" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                        <input type="password" name="confirm_password" class="form-control border-start-0" placeholder="Repeat password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-accent w-100 py-2 mb-3">
                    <i class="bi bi-person-plus me-1"></i> Create Account
                </button>
            </form>
            <p class="text-center text-muted small">Already have an account? <a href="{{ url_for('login') }}" class="text-accent fw-bold">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
